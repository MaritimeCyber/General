<style>
  #hg-wrap,

    box-sizing: border-box;

    margin: 0;
    padding: 0;
  }
  @keyframes hg-pulse {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0.35;
    }
  }
  #hg-ip-pill {
    display: inline-block;
    background: #1a9e82;
    color: #fff;
    font-size: 11.5px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    letter-spacing: 0.3px;
    vertical-align: middle;
  }
  .hg-para {
    font-size: 13px;
    color: #424242;
    line-height: 1.9;
    margin-bottom: 10px;
  }
  .hg-para .hl {
    font-weight: 700;
    color: #1a9e82;
  }
  .hg-para .dim {
    font-size: 11.5px;
    color: #9fb5c2;
  }
  #hg-confirm {
    margin-top: 13px;
    padding: 9px 12px;
    background: #f4faf8;
    border-left: 3px solid #1a9e82;
    border-radius: 4px;
    font-size: 12px;
    color: #5a7080;
    line-height: 1.7;
  }
</style>

    /* ═══════════════════════════════════════
     D) 헬퍼 함수들
  ═══════════════════════════════════════ */

    function fmt(tpl, vars) {
      return tpl.replace(/\{(\w+)\}/g, function (_, k) {
        return vars[k] !== undefined ? vars[k] : "";
      });
    }

    function toFlag(code) {
      if (!code || code.length !== 2) return "🌐";
      var pts = code
        .toUpperCase()
        .split("")
        .map(function (c) {
          return 0x1f1e6 + (c.charCodeAt(0) - 65);
        });
      return String.fromCodePoint(pts[0], pts[1]);
    }

    function maskIP(ip) {
      if (!ip) return "—";
      var parts = ip.split(".");
      if (parts.length === 4)
        return parts[0] + "." + parts[1] + "." + parts[2] + ".**";
      var v6 = ip.split(":");
      v6[v6.length - 1] = "****";
      return v6.join(":");
    }

    /* deviceKey: 'desktop' | 'mobile' | 'tablet' */
    function getDevice() {
      var ua = navigator.userAgent;
      var deviceKey = "desktop";
      if (/iPad|Tablet/i.test(ua)) deviceKey = "tablet";
      else if (/Mobi|Android|iPhone/i.test(ua)) deviceKey = "mobile";

      var os = "Unknown OS";
      if (/Windows NT 10/i.test(ua)) os = "Windows 10/11";
      else if (/Windows NT 6\.3/i.test(ua)) os = "Windows 8.1";
      else if (/Windows NT 6\.1/i.test(ua)) os = "Windows 7";
      else if (/Windows/i.test(ua)) os = "Windows";
      else if (/iPhone OS/i.test(ua)) {
        var iv = ua.match(/iPhone OS ([\d_]+)/);
        os = "iOS " + (iv ? iv[1].replace(/_/g, ".") : "");
      } else if (/iPad.*OS/i.test(ua)) {
        var pv = ua.match(/OS ([\d_]+)/);
        os = "iPadOS " + (pv ? pv[1].replace(/_/g, ".") : "");
      } else if (/Android/i.test(ua)) {
        var av = ua.match(/Android ([\d.]+)/);
        os = "Android " + (av ? av[1] : "");
      } else if (/Mac OS X/i.test(ua)) {
        var mv = ua.match(/Mac OS X ([\d_]+)/);
        os = "macOS " + (mv ? mv[1].replace(/_/g, ".") : "");
      } else if (/Linux/i.test(ua)) {
        os = "Linux";
      }

      var browser = "Unknown Browser";
      if (/Edg\//i.test(ua)) {
        var ev = ua.match(/Edg\/([\d.]+)/);
        browser = "Edge " + (ev ? ev[1].split(".")[0] : "");
      } else if (/OPR\//i.test(ua)) {
        var ov = ua.match(/OPR\/([\d.]+)/);
        browser = "Opera " + (ov ? ov[1].split(".")[0] : "");
      } else if (/Firefox\//i.test(ua)) {
        var fv = ua.match(/Firefox\/([\d.]+)/);
        browser = "Firefox " + (fv ? fv[1].split(".")[0] : "");
      } else if (/Chrome\//i.test(ua) && !/Chromium/i.test(ua)) {
        var cv = ua.match(/Chrome\/([\d.]+)/);
        browser = "Chrome " + (cv ? cv[1].split(".")[0] : "");
      } else if (/Safari\//i.test(ua) && !/Chrome/i.test(ua)) {
        var sv = ua.match(/Version\/([\d.]+)/);
        browser = "Safari " + (sv ? sv[1].split(".")[0] : "");
      }

      return { deviceKey: deviceKey, os: os, browser: browser };
    }

    /* 시간대 키: 'morning' | 'afternoon' | 'evening' | 'lateNight' */
    function getTimeGreet(tz) {
      try {
        var h = parseInt(
          new Date().toLocaleString("en-US", {
            timeZone: tz,
            hour: "numeric",
            hour12: false,
          }),
        );
        if (h >= 5 && h < 12) return "morning";
        if (h >= 12 && h < 18) return "afternoon";
        if (h >= 18 && h < 22) return "evening";
        return "lateNight";
      } catch (e) {
        return "";
      }
    }

    /* ═══════════════════════════════════════
     E-1) OSI 7계층 + PDU 연결 스택
  ═══════════════════════════════════════ */
    function getOSILayers(d, dev) {
      var conn =
        navigator.connection ||
        navigator.mozConnection ||
        navigator.webkitConnection;
      var isHTTPS = window.location.protocol === "https:";
      var layers = [];

      /* L7 — Application */
      layers.push({
        num: 7,
        name: "Application",
        pdu: "Message",
        value: (isHTTPS ? "HTTPS" : "HTTP") + " · " + dev.browser,
      });

      /* L6 — Presentation */
      layers.push({
        num: 6,
        name: "Presentation",
        pdu: "Data",
        value:
          (isHTTPS ? "TLS Encrypted" : "Plaintext") +
          " · " +
          (document.characterSet || "UTF-8"),
      });

      /* L5 — Session */
      var sess = [];
      if (navigator.cookieEnabled) sess.push("Cookie ✓");
      if (typeof WebSocket !== "undefined") sess.push("WebSocket ✓");
      layers.push({
        num: 5,
        name: "Session",
        pdu: "Data",
        value: sess.length ? sess.join(" · ") : "Active",
      });

      /* L4 — Transport */
      layers.push({
        num: 4,
        name: "Transport",
        pdu: "Segment",
        value: "TCP · Port " + (isHTTPS ? "443" : "80"),
      });

      /* L3 — Network */
      var ipNet = d && d.ip ? maskIP(d.ip) : "N/A";
      if (d && d.org) {
        var asnM = d.org.match(/^(AS\d+)/);
        if (asnM) ipNet += " · " + asnM[1];
      }
      layers.push({ num: 3, name: "Network", pdu: "Packet", value: ipNet });

      /* L2 — Data Link */
      var ltype = "Unknown";
      if (conn && conn.type) {
        var lt = {
          wifi: "WiFi",
          ethernet: "Ethernet",
          cellular: "Cellular",
          bluetooth: "Bluetooth",
        };
        ltype = lt[conn.type] || conn.type;
        if (conn.effectiveType)
          ltype += " (" + conn.effectiveType.toUpperCase() + ")";
      } else if (conn && conn.effectiveType) {
        ltype = conn.effectiveType.toUpperCase();
      }
      layers.push({ num: 2, name: "Data Link", pdu: "Frame", value: ltype });

      /* L1 — Physical */
      var phy;
      if (conn && conn.type === "wifi") phy = "RF 2.4 / 5 GHz";
      else if (conn && conn.type === "cellular") phy = "RF Cellular";
      else if (conn && conn.type === "ethernet") phy = "Copper / Fiber";
      else phy = dev.deviceKey === "mobile" ? "RF Wireless" : "Cable / RF";
      layers.push({
        num: 1,
        name: "Physical",
        pdu: "Bit",
        value: phy + " · " + dev.os,
      });

      return layers;
    }

    /* ═══════════════════════════════════════
     E) 유입 경로 감지 — { type, src, icon }
  ═══════════════════════════════════════ */
    function getReferrer() {
      var ref = document.referrer;
      if (!ref) return { type: "direct", src: "", icon: "🏠" };
      var host = "";
      try {
        host = new URL(ref).hostname.toLowerCase();
      } catch (e) {
        host = ref.toLowerCase();
      }

      if (/google\./i.test(host))
        return { type: "search", src: "Google", icon: "🔍" };
      if (/naver\./i.test(host))
        return { type: "search", src: "Naver", icon: "🔍" };
      if (/bing\./i.test(host))
        return { type: "search", src: "Bing", icon: "🔍" };
      if (/daum\.|kakao\./i.test(host))
        return { type: "search", src: "Daum", icon: "🔍" };
      if (/yahoo\./i.test(host))
        return { type: "search", src: "Yahoo", icon: "🔍" };
      if (/duckduckgo\./i.test(host))
        return { type: "search", src: "DuckDuckGo", icon: "🔍" };
      if (/baidu\./i.test(host))
        return { type: "search", src: "百度 Baidu", icon: "🔍" };
      if (/yandex\./i.test(host))
        return { type: "search", src: "Yandex", icon: "🔍" };

      if (/linkedin\./i.test(host))
        return { type: "social", src: "LinkedIn", icon: "💼" };
      if (/facebook\.|fb\.com/i.test(host))
        return { type: "social", src: "Facebook", icon: "📘" };
      if (/twitter\.|x\.com/i.test(host))
        return { type: "social", src: "X (Twitter)", icon: "🐦" };
      if (/instagram\./i.test(host))
        return { type: "social", src: "Instagram", icon: "📷" };
      if (/youtube\./i.test(host))
        return { type: "social", src: "YouTube", icon: "🎬" };
      if (/reddit\./i.test(host))
        return { type: "social", src: "Reddit", icon: "🟠" };
      if (/t\.me|telegram\./i.test(host))
        return { type: "social", src: "Telegram", icon: "✈️" };
      if (/github\./i.test(host))
        return { type: "social", src: "GitHub", icon: "💻" };
      if (/medium\./i.test(host))
        return { type: "social", src: "Medium", icon: "📝" };

      if (/blogspot\.|blogger\./i.test(host))
        return { type: "blog", src: "", icon: "⚓" };

      return { type: "link", src: host.replace(/^www\./, ""), icon: "🔗" };
    }

      var ipText = d && d.ip ? maskIP(d.ip) : "Guest";
      var s1 =
        '<p class="hg-para"><span id="hg-ip-pill">' +
        ipText +
        "</span>" +
        (s.honorific
          ? ' <span style="font-weight:600;">' + s.honorific + "</span>"
          : "") +
        "</p>";

      /* 문장 2: 위치 + 단말기 */
      var s2 = '<p class="hg-para">';
      if (loc) {
        s2 +=
          '<span class="hl">' + fmt(s.fromLoc, { loc: loc }) + "</span><br>";
      }
      s2 +=
        fmt(s.connVia, {
          br: '<span class="hl">' + dev.browser + "</span>",
          os: '<span class="hl">' + dev.os + "</span>",
          dev: '<span class="dim">' + devLabel + "</span>",
        }) + "</p>";

      /* 문장 3: 시간대 */
      var s3 = "";
      if (tgLabel || timeStr) {
        s3 =
          '<p class="hg-para">' +
          fmt(s.timeConn, {
            tg: tgLabel ? '<span class="hl">' + tgLabel + "</span>" : "",
            tz: timeStr ? '<span class="dim">' + timeStr + "</span>" : "",
          }) +
          "</p>";
      }

      document.getElementById("hg-body").innerHTML = s0 + s1 + s2 + s3;

      /* 추가 확인 정보 */
      var extras = [];

      if (d && d.org)
        extras.push({ label: "📡 ISP", value: d.org.replace(/^AS\d+\s*/, "") });

      if (d && d.timezone) {
        try {
          var localTime = new Date().toLocaleString(
            navigator.language || "en-US",
            {
              timeZone: d.timezone,
              hour: "2-digit",
              minute: "2-digit",
              second: "2-digit",
              hour12: false,
            },
          );
          extras.push({ label: "🕐 Local Time", value: localTime });
        } catch (e) {}
      }

      if (d && d.currency)
        extras.push({ label: "💱 Currency", value: d.currency });

      if (d && d.country_calling_code)
        extras.push({ label: "📞 Dial Code", value: d.country_calling_code });

      extras.push({
        label: "📍 GPS",
        value:
          '<span id="hg-gps-val" style="font-style:italic;font-weight:400;color:#b0c4ce;">위치 권한 요청 중…</span>',
      });

      try {
        extras.push({
          label: "🖥 Resolution",
          value:
            screen.width +
            " × " +
            screen.height +
            "  /  " +
            window.innerWidth +
            " × " +
            window.innerHeight,
        });
      } catch (e) {}

      if (navigator.language)
        extras.push({ label: "🔤 Language", value: navigator.language });

      try {
        var conn =
          navigator.connection ||
          navigator.mozConnection ||
          navigator.webkitConnection;
        if (conn && conn.effectiveType) {
          var nl = {
            "slow-2g": "Slow-2G",
            "2g": "2G",
            "3g": "3G",
            "4g": "4G / WiFi",
          };
          extras.push({
            label: "📶 Network",
            value:
              (nl[conn.effectiveType] || conn.effectiveType.toUpperCase()) +
              (conn.downlink ? "  (" + conn.downlink + " Mbps)" : ""),
          });
        }
      } catch (e) {}

      /* 추가 확인 정보 + OSI/PDU 스택 */
      var exHTML =
        '<div style="margin-top:12px;padding:9px 11px;background:#f9fafa;' +
        'border-radius:4px;font-size:11.5px;color:#5a7080;line-height:1.9;">';

      if (extras.length > 0) {
        exHTML +=
          '<div style="font-weight:700;color:#b0c4ce;font-size:10px;' +
          'letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">' +
          s.extraTitle +
          "</div>";
        extras.forEach(function (e) {
          exHTML +=
            '<div style="display:flex;gap:6px;margin-bottom:1px;">' +
            '<span style="color:#b0c4ce;flex-shrink:0;min-width:72px;">' +
            e.label +
            "</span>" +
            '<span style="color:#424242;font-weight:600;">' +
            e.value +
            "</span></div>";
        });
        exHTML +=
          '<div style="margin:8px 0 4px;border-top:1px dashed #dce8ed;"></div>';
      }

      /* OSI / PDU Stack */
      var osiLayers = getOSILayers(d, dev);
      exHTML +=
        '<div style="font-weight:700;color:#b0c4ce;font-size:10px;' +
        'letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;">' +
        "🔌 OSI / PDU Stack" +
        "</div>";
      osiLayers.forEach(function (layer) {
        exHTML +=
          '<div style="margin-bottom:5px;">' +
          '<div style="display:flex;align-items:center;gap:5px;margin-bottom:2px;">' +
          '<span style="background:#1a9e82;color:#fff;font-size:9px;font-weight:700;' +
          'padding:1px 5px;border-radius:3px;flex-shrink:0;min-width:22px;' +
          'text-align:center;">' +
          "L" +
          layer.num +
          "</span>" +
          '<span style="color:#7a9aaa;font-size:10.5px;font-weight:600;flex:1;">' +
          layer.name +
          "</span>" +
          '<span style="background:#e8f6f3;color:#1a9e82;font-size:9px;' +
          'font-weight:600;padding:1px 6px;border-radius:3px;' +
          'white-space:nowrap;">' +
          layer.pdu +
          "</span>" +
          "</div>" +
          '<div style="padding-left:28px;color:#424242;font-size:11px;' +
          'font-weight:600;line-height:1.5;word-break:break-word;">' +
          layer.value +
          "</div></div>";
      });

      exHTML += "</div>";
      document.getElementById("hg-extra").innerHTML = exHTML;

      /* 단말기 GPS (Geolocation API) — 세션 중 1회만 수집 */
      (function (fallbackD) {
        var GPS_KEY = "hg_gps_cache";

        function showGPS(lat, lon, isIPBased) {
          var gEl = document.getElementById("hg-gps-val");
          if (!gEl) return;
          var latF = Math.abs(parseFloat(lat)).toFixed(4);
          var lonF = Math.abs(parseFloat(lon)).toFixed(4);
          var latDir = parseFloat(lat) >= 0 ? "N" : "S";
          var lonDir = parseFloat(lon) >= 0 ? "E" : "W";
          var mapsUrl = "https://www.google.com/maps?q=" + lat + "," + lon;
          gEl.removeAttribute("style");
          gEl.innerHTML =
            latF +
            "° " +
            latDir +
            "<br>" +
            lonF +
            "° " +
            lonDir +
            '<br><a href="' +
            mapsUrl +
            '" target="_blank" rel="noopener"' +
            ' style="color:#1a9e82;font-size:10px;font-weight:400;">Maps ↗</a>' +
            (isIPBased
              ? '<br><span style="color:#b0c4ce;font-weight:400;font-size:10px;">(IP 기반 추정)</span>'
              : "");
        }
        function showMsg(msg) {
          var gEl = document.getElementById("hg-gps-val");
          if (gEl)
            gEl.innerHTML =
              '<span style="color:#b0c4ce;">' + msg + "</span>";
        }
        function saveGPS(lat, lon, ipBased) {
          try {
            sessionStorage.setItem(
              GPS_KEY,
              JSON.stringify({ lat: lat, lon: lon, ip: ipBased }),
            );
          } catch (e) {}
        }

        /* 세션 내 이미 수집된 좌표가 있으면 즉시 표시하고 종료 */
        try {
          var cached = JSON.parse(
            sessionStorage.getItem(GPS_KEY) || "null",
          );
          if (cached) {
            showGPS(cached.lat, cached.lon, cached.ip);
            return;
          }
        } catch (e) {}

        if (!navigator.geolocation) {
          if (fallbackD && fallbackD.latitude != null) {
            saveGPS(fallbackD.latitude, fallbackD.longitude, true);
            showGPS(fallbackD.latitude, fallbackD.longitude, true);
          } else showMsg("지원 안 됨");
          return;
        }
        navigator.geolocation.getCurrentPosition(
          function (pos) {
            saveGPS(pos.coords.latitude, pos.coords.longitude, false);
            showGPS(pos.coords.latitude, pos.coords.longitude, false);
          },
          function () {
            if (fallbackD && fallbackD.latitude != null) {
              saveGPS(fallbackD.latitude, fallbackD.longitude, true);
              showGPS(fallbackD.latitude, fallbackD.longitude, true);
            } else showMsg("권한 거부됨");
          },
          { timeout: 10000, maximumAge: 0 },
        );
      })(d);

      /* 표시 */
      document.getElementById("hg-loading").style.display = "none";
      document.getElementById("hg-main").style.display = "block";

      /* 안전 확인 문구 (현지어) */
      document.getElementById("hg-confirm").innerHTML = s.confirmed;
    }

    /* ═══════════════════════════════════════
     G) localStorage 캐시 (TTL 30분) + API 호출
  ═══════════════════════════════════════ */
    var CACHE_KEY = "hg_ip_cache";
    var CACHE_TTL = 30 * 60 * 1000;

    function getCached() {
      try {
        var raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return null;
        var obj = JSON.parse(raw);
        if (Date.now() - obj.ts > CACHE_TTL) {
          localStorage.removeItem(CACHE_KEY);
          return null;
        }
        return obj.data;
      } catch (e) {
        return null;
      }
    }

    function setCached(data) {
      try {
        localStorage.setItem(
          CACHE_KEY,
          JSON.stringify({ ts: Date.now(), data: data }),
        );
      } catch (e) {}
    }

    var cached = getCached();
    if (cached) {
      render(cached);
    } else {
      var fallbackTimer = setTimeout(function () {
        render(null);
      }, 6000);
      try {
        fetch("https://ipapi.co/json/")
          .then(function (r) {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
          })
          .then(function (data) {
            clearTimeout(fallbackTimer);
            setCached(data);
            render(data);
          })
          .catch(function () {
            clearTimeout(fallbackTimer);
            render(null);
          });
      } catch (e) {
        clearTimeout(fallbackTimer);
        render(null);
      }
    }
  })();
</script>
